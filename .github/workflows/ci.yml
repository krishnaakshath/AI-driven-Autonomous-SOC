name: Autonomous SOC CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build_and_verify:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3
      
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        
    - name: Lint System Syntax (flake8)
      run: |
        # Stop build if there are fatal syntax errors (E9, F63, F7, F82)
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Treat other formatting errors as non-breaking warnings
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
        
    - name: Execute RL Matrix Verifications (pytest)
      run: |
        # Run automated assertions on algorithmic math components
        pytest tests/
