name: Autonomous SOC CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install ruff
      run: pip install ruff

    - name: Ruff lint (fail on errors)
      run: ruff check . --select E9,F63,F7,F82 --no-fix

    - name: Ruff lint (warnings)
      run: ruff check . --ignore E501 --exit-zero --statistics

  test:
    name: Unit Tests + Coverage
    runs-on: ubuntu-latest
    needs: lint
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov

    - name: Run unit tests with coverage
      run: |
        pytest tests/test_comprehensive.py tests/test_auth.py -v --tb=short \
          --cov=services --cov=ml_engine --cov-report=term-missing \
          --cov-fail-under=40
      env:
        SUPABASE_URL: ""
        SUPABASE_KEY: ""

  integration:
    name: Integration Tests (Mocked)
    runs-on: ubuntu-latest
    needs: test
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest

    - name: Run mocked integration tests
      run: |
        pytest tests/test_comprehensive.py::TestMockSupabase -v --tb=short
