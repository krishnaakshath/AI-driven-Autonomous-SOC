name: CI — AI-Driven Autonomous SOC

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: |
          python -m pytest tests/test_suite.py -v --tb=short

      - name: Run import smoke test
        run: |
          python -c "
          import sys; sys.path.insert(0, '.')
          from services.database import db
          from services.siem_service import siem_service
          from services.report_generator import generate_security_report
          from services.playbook_engine import playbook_engine
          from services.firewall_shim import firewall
          from services.threat_intel import threat_intel
          from services.security_scanner import run_full_scan
          from ml_engine import score_network_event, detect_anomalies, cluster_threats
          print('All core imports OK')
          "

      - name: Verify database operations
        run: |
          python -c "
          import sys; sys.path.insert(0, '.')
          from services.database import db
          stats = db.get_stats()
          print(f'DB stats: {stats}')
          assert 'total' in stats
          assert 'critical' in stats
          print('Database operations OK')
          "

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check for syntax errors
        run: |
          pip install pyflakes
          find . -name "*.py" -not -path "./.venv/*" -not -path "./soc-env/*" -not -path "./__pycache__/*" | head -30 | xargs python -m pyflakes || true
