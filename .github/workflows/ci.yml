name: CI — AI-Driven Autonomous SOC

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ─── Unit Tests (always run, no secrets needed) ─────────────────────────
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov

      - name: Run unit tests with coverage
        run: |
          python -m pytest tests/test_unit.py -v --tb=short -m unit \
            --cov=services --cov=ml_engine --cov-report=term-missing || true

      - name: Run legacy test suite
        run: |
          python -m pytest tests/test_suite.py -v --tb=short || true

      - name: Import smoke test
        run: |
          python -c "
          import sys; sys.path.insert(0, '.')
          from services.database import db
          from services.siem_service import siem_service
          from services.report_generator import generate_security_report
          from services.playbook_engine import playbook_engine
          from services.firewall_shim import firewall
          from services.firewall_service import FirewallService
          from services.threat_intel import threat_intel
          from services.security_scanner import run_full_scan
          from ml_engine import score_network_event, detect_anomalies, cluster_threats
          print('All core imports OK')
          "

  # ─── Integration Tests (only when secrets exist) ───────────────────────
  integration-tests:
    runs-on: ubuntu-latest
    if: ${{ vars.SUPABASE_URL != '' || secrets.SUPABASE_URL != '' }}
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run integration tests
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python -m pytest tests/test_integration.py -v --tb=short -m integration

      - name: Verify database operations
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python -c "
          import sys; sys.path.insert(0, '.')
          from services.database import db
          stats = db.get_stats()
          print(f'DB stats: {stats}')
          assert 'total' in stats
          assert 'critical' in stats
          print('Database operations OK')
          "

  # ─── Lint + Security Scanning ──────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linters
        run: pip install pyflakes ruff

      - name: Ruff lint
        run: ruff check . --ignore E501 || true

      - name: Check for syntax errors
        run: |
          find . -name "*.py" -not -path "./.venv/*" -not -path "./soc-env/*" -not -path "./__pycache__/*" | head -40 | xargs python -m pyflakes || true

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Dependency audit
        run: |
          pip install pip-audit
          pip install -r requirements.txt
          pip-audit --fix --dry-run || true
